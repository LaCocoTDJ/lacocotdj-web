<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>+LaCocoTDJ+ | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #000; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Hero con tu foto de perfil de la piscina */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), 
                        url('foto-perfil-mavelpoint-copia-thumb-1750747113118-eeb98ad7-d9d2-470f-91bb-e68084814bef.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .gold { color: #f1b307; }

        .logo-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3rem, 12vw, 9rem);
            line-height: 0.85;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .btn-booking {
            background: #f1b307;
            color: black;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(241, 179, 7, 0.3);
        }

        .btn-booking:hover {
            transform: translateY(-5px);
            background: #fff;
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- Navegación Superior -->
    <nav class="nav">
        <div style="font-family: 'Archivo Black';" class="gold text-2xl italic uppercase tracking-tighter">+LACOCOTDJ+</div>
        <div class="flex gap-6">
            <a href="https://instagram.com/LaCocoTDJ" target="_blank" class="gold text-3xl"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/34662300699" target="_blank" class="gold text-3xl"><i class="fab fa-whatsapp"></i></a>
        </div>

    <!-- Sección Principal (Hero) -->
    <header class="hero">

            <a href="https://wa.me/34662300699" target="_blank" class="btn-booking italic">RESERVAR FECHA</a>
        </div>
    </header>

    <!-- El Show -->
    <section class="max-w-6xl mx-auto py-24 px-6 grid md:grid-cols-2 gap-16 items-center">
        <div>
            <h2 class="text-6xl font-black mb-8 uppercase italic leading-none">THE <span class="gold">SHOW</span></h2>
            <p class="text-zinc-400 text-xl leading-relaxed">
                Transformo cada cabina en un escenario vibrante. No solo es poner música, es crear una atmósfera de pura electricidad.
            </p>
        </div>
        <div style="border-radius: 30px; overflow: hidden; border: 1px solid #333;">
            <img src="WhatsApp Image 2026-04-22 at 11.37.47.jpeg" alt="[Imagen de LaCocoTDJ en el escenario]" class="w-full grayscale hover:grayscale-0 transition duration-700">
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-16 text-center border-t border-zinc-900 bg-black">
        <div class="gold font-black tracking-[12px] uppercase text-[10px] mb-4 italic">MADRID • IBIZA • WORLDWIDE</div>
        <p class="text-zinc-800 text-[9px] font-bold uppercase tracking-widest">+LaCocoTDJ+ Official 2026</p>
    </footer>

</body>
</html>
