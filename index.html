<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Previa +LaCocoTDJ+</title>
    <!-- Tailwind para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos y Fuentes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .font-huge {
            font-family: 'Archivo Black', sans-serif;
            line-height: 0.8;
            letter-spacing: -0.05em;
        }

        /* Hero con la foto de fondo y el texto a la izquierda */
        .hero-section {
            height: 100vh;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%),
                        url('https://samavelpointappprodwe.blob.core.windows.net/app-images/artist/ad7b3f08-8202-493e-9b02-bcf06b486c70/profile/thumbnail/foto-perfil-mavelpoint-copia-thumb-1750747113118-eeb98ad7-d9d2-470f-91bb-e68084814bef.jpg');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: center;
            padding: 0 8%;
        }

        .btn-gold {
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2);
        }

        .btn-gold:hover {
            background: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Navegación Fija -->
    <nav class="fixed w-full z-50 p-6 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/5">
        <div class="font-huge text-yellow-400 text-2xl italic uppercase tracking-tighter">+LACOCOTDJ+</div>
        <div class="flex gap-6 text-yellow-400">
            <i class="fab fa-instagram text-xl"></i>
            <i class="fab fa-whatsapp text-xl"></i>
        </div>
    </nav>

    <!-- SECCIÓN HERO - EL "PURA ENERGÍA" GIGANTE -->
    <header class="hero-section">
        <div class="max-w-4xl">
            <h1 class="font-huge text-[18vw] md:text-[10rem] uppercase italic">
                PURA<br>
                <span class="text-yellow-400">ENERGÍA</span>
            </h1>
            <p class="mt-8 text-zinc-400 font-black tracking-[0.6em] uppercase text-[10px] md:text-sm border-l-4 border-yellow-400 pl-6 italic">
                Showwoman & DJ Set International
            </p>
            <div class="btn-gold mt-12 px-10 py-5 rounded-full inline-flex items-center gap-4 text-xs tracking-widest uppercase italic cursor-pointer">
                RESERVAR FECHA <i class="fas fa-arrow-right"></i>
            </div>
        </div>
    </header>

    <!-- SECCIÓN SHOW -->
    <section class="py-24 px-8 max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
        <div class="order-2 md:order-1">
            <div class="relative rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl">
                <img src="https://samavelpointappprodwe.blob.core.windows.net/app-images/artist/ad7b3f08-8202-493e-9b02-bcf06b486c70/cover/thumbnail/portada-mavelpoint-1750747113118-eeb98ad7-d9d2-470f-91bb-e68084814bef.jpg" 
                     alt="[Imagen del Show]" class="w-full grayscale hover:grayscale-0 transition-all duration-1000">
            </div>
        </div>
        <div class="order-1 md:order-2 space-y-6">
            <h2 class="font-huge text-5xl md:text-7xl uppercase italic">EL <span class="text-yellow-400">SHOW</span></h2>
            <p class="text-zinc-400 text-xl leading-relaxed font-light italic">
                "No solo pincho música, transformo la energía de la pista. Mi show es una conexión real."
            </p>
            <div class="flex gap-4">
                <div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 flex-1">
                    <span class="block text-yellow-400 font-black text-2xl uppercase italic">100%</span>
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Energía</span>
                </div>
                <div class="bg-zinc-900/50 p-6 rounded-2xl border border-white/5 flex-1">
                    <span class="block text-yellow-400 font-black text-2xl uppercase italic">LIVE</span>
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Show</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Simple -->
    <footer class="py-16 text-center border-t border-white/5">
        <div class="text-yellow-400 font-black tracking-[1.5em] text-[10px] uppercase mb-8 italic">MADRID • WORLDWIDE</div>
        <p class="text-[8px] font-bold text-zinc-800 tracking-[0.5em] uppercase italic">+LACOCOTDJ+ 2026</p>
    </footer>

</body>
</html>
}
