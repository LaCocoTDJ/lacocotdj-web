<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Oficial +LaCocoTDJ+</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .font-huge {
            font-family: 'Archivo Black', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
        }

        /* Contenedor principal que se adapta a la foto */
        .hero-container {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* La imagen manda: se muestra completa sin recortes de fondo */
        .hero-image-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .hero-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            /* Ajuste ligero para que en pantallas muy altas no se pierda el foco */
            max-height: 95vh;
            object-fit: contain;
            object-position: top;
        }

        /* El texto se coloca sobre la parte inferior de la foto (la zona de la piscina) */
        .hero-text-overlay {
            position: absolute;
            bottom: 8%;
            left: 6%;
            right: 6%;
            z-index: 20;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 6%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            /* Degradado superior para que los iconos amarillos resalten */
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .btn-gold {
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        .social-circle {
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #ffcc00;
            color: #ffcc00;
            margin-left: 8px;
            backdrop-filter: blur(4px);
        }

        /* Sombra fuerte para asegurar legibilidad sobre el agua/suelo */
        .shadow-hard {
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body class="overflow-x-hidden">

</body>
</html>
