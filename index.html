        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        .font-huge {
            font-family: 'Archivo Black', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
        }

        /* HERO A PANTALLA COMPLETA */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: flex-end; /* Texto abajo */
            padding-bottom: 10vh;
        }

        /* La foto ocupa todo el fondo */
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* ESTO ES LO IMPORTANTE: Enfoca la parte superior para que se vea tu cara */
            object-position: center 15%; 
        }

        /* Capa de protección para que se lea el texto sin taparte a ti */
        .hero-overlay {
            position: absolute;
            inset: 0;
            /* Degradado muy sutil arriba, más fuerte abajo donde va el texto */
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.3) 0%, 
                transparent 40%, 
                rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 8%;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 8%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .btn-gold {
            background: #ffcc00;
            color: #000;
            font-weight: 900;
            box-shadow: 0 4px 20px rgba(255, 204, 0, 0.4);
        }

        .social-circle {
            background: rgba(0,0,0,0.3);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(255, 204, 0, 0.5);
            color: #ffcc00;
            margin-left: 10px;
            backdrop-filter: blur(8px);
        }

        .shadow-hard {
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        /* Animación suave para el título */
        .fade-up {
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
